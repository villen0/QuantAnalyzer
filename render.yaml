services:
  - type: web
    name: quantanalyzer-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOW_ORIGINS
        fromService:
          name: quantanalyzer-app
          type: static
          property: host

  - type: static
    name: quantanalyzer-app
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: quantanalyzer-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
