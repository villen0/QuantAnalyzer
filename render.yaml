services:
  - type: web
    name: quantanalyzer
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
